name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# R150: cancel superseded runs on the same PR/branch to stop double-billing
# CI minutes on rapid pushes. `main`/`master` excluded so post-merge runs
# always complete (their tag/version artefacts are load-bearing).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Skip the fastembed download-gated tests by default in CI. Set to 1
  # manually (workflow_dispatch / repository_dispatch) to run the full
  # vector E2E suite.
  FASTEMBED_DOWNLOAD: "0"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Lint with the heavy feature set too — clippy is cheap once cached.
      - run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Fast path: build + test without fastembed/ONNX. Covers the
      # core, store, search, importer, all adapters, plus the MCP
      # server's stdio path. About 1k tests in <2 min after cache warm.
      - name: build (no-default-features)
        run: cargo build --workspace --all-targets --no-default-features
      - name: test (no-default-features)
        # Exclude benches: criterion's harness=false binaries reject libtest
        # args like --test-threads. Benches are still compiled by the build
        # step above and by clippy (--all-targets), just not executed here.
        run: cargo test --workspace --lib --bins --tests --examples --no-default-features -- --test-threads=2

  # Separate job: build + test with the `sse` feature so the HTTP
  # transport (axum) + generic-mcp loopback are exercised. Still skips
  # fastembed.
  test-sse:
    name: test (sse, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: test (sse only)
        run: |
          cargo test -p anamnesis-mcp-server --no-default-features --features sse -- --test-threads=2
          cargo test -p anamnesis-adapter-generic-mcp -- --test-threads=2

  # Verify the heavy default-feature build still compiles (no test
  # execution). Catches breakage in the fastembed code path without
  # paying the ONNX-runtime test tax.
  build-default:
    name: build (default features)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets

  # R150: doctests — the main test matrix runs `--lib --bins --tests
  # --examples`, deliberately not `--doc`. Run them once on linux so a
  # broken doctest in a public API doesn't sneak past CI.
  doctests:
    name: doctests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --doc --no-default-features

  # R150: rustdoc warnings as errors. Catches broken intra-doc links and
  # rustdoc lints (`missing_docs` is already `warn` in several crates) so
  # the public API docs don't quietly rot.
  doc:
    name: doc (-D warnings)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --no-default-features

  # R150: supply-chain advisories. Pulls the latest RustSec database
  # and fails on any CVE / yanked crate / unmaintained advisory not
  # explicitly ignored in `deny.toml`.
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # R150: license + duplicate-version + source allowlist. Reads
  # `deny.toml` at repo root. Distinct from `audit` because cargo-deny
  # also enforces our Apache-2.0 license-compatibility story (§-1.2.4).
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check
