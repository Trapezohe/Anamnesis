name: publish-crates

# Manual-only crates.io publish in topological order. Defaults to
# dry-run; flip the input to `false` for the real upload.
#
# Prereqs (one-time):
#   1. Create a crates.io account, log in
#      https://crates.io/settings/tokens, create a token with the
#      `publish-new` + `publish-update` scopes.
#   2. In the repo: Settings → Secrets and variables → Actions →
#      `CARGO_REGISTRY_TOKEN` with the token value.
#
# Order matters: cargo refuses to publish a crate when any internal
# dep it pulls from the same workspace isn't yet on crates.io. Each
# real publish sleeps 30 s to let the registry index propagate before
# the next dependent crate is uploaded.
#
# A failed step does NOT roll back earlier uploads. Re-running a
# specific step is safe (cargo publish refuses to overwrite an
# existing version), so you can rerun the workflow from where it
# failed without bumping the version.
#
# Dry-run note: `cargo publish --dry-run` for tier-2+ crates also
# fails until tier-1 is *really* on crates.io, because dry-run goes
# through the same index lookup. So:
#   - tier-1 (anamnesis-core) can be dry-run safely now
#   - tier-2+ dry-runs only become meaningful after the first real
#     publish has happened
# The workflow runs all tiers regardless; non-tier-1 dry-runs will
# show the "no matching package" error until the real publish ladder
# has been climbed once.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true = cargo publish --dry-run, false = real upload"
        required: true
        default: "true"
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish (topological order)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # ───────────────────────────────────────────────────────────────
      # Tier 1 — no internal deps.
      # ───────────────────────────────────────────────────────────────
      - name: anamnesis-core
        env: { CARGO_REGISTRY_TOKEN: "${{ secrets.CARGO_REGISTRY_TOKEN }}" }
        run: |
          crate=anamnesis-core
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish --dry-run -p $crate || true
          else
            out=$(cargo publish -p $crate 2>&1) || true
            echo "$out"
            if echo "$out" | grep -qE 'crate version .* is already uploaded|already uploaded'; then
              echo "✓ $crate is already on crates.io — skipping (idempotent)"
            elif echo "$out" | grep -q 'Uploading'; then
              echo "✓ $crate uploaded"
              sleep 60
            elif echo "$out" | grep -qE '429|rate limit|Too Many Requests'; then
              # crates.io: 5-token burst then 1/10min refill. Wait 11 min and retry.
              echo "⏳ $crate hit rate limit, waiting 660s and retrying once..."
              sleep 660
              out2=$(cargo publish -p $crate 2>&1) || true
              echo "$out2"
              if echo "$out2" | grep -qE 'crate version .* is already uploaded|already uploaded'; then
                echo "✓ $crate now on crates.io (race with another publisher) — skipping"
              elif echo "$out2" | grep -q 'Uploading'; then
                echo "✓ $crate uploaded after rate-limit wait"
                sleep 60
              else
                echo "✗ $crate still failing after rate-limit wait" >&2
                exit 1
              fi
            else
              echo "✗ $crate publish failed (see output above)" >&2
              exit 1
            fi
          fi

      # ───────────────────────────────────────────────────────────────
      # Tier 2 — depends on core.
      # ───────────────────────────────────────────────────────────────
      - name: anamnesis-store
        env: { CARGO_REGISTRY_TOKEN: "${{ secrets.CARGO_REGISTRY_TOKEN }}" }
