      - name: anamnesis-adapter-memos
        env: { CARGO_REGISTRY_TOKEN: "${{ secrets.CARGO_REGISTRY_TOKEN }}" }
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
